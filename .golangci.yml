version: "2"
run: { timeout: 5m }
linters:
  enable:
    - govet
    - errcheck
    - staticcheck
    - ineffassign
    - unused
    - revive
  settings:
    revive:
      rules:
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
formatters:
  enable:
    - goimports
issues:
  exclude-rules:
    - path: _test\.go
      linters: [errcheck]
    - path: _test\.go
      text: "unused-parameter"
