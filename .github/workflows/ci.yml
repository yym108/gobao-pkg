name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.26" }
      - run: go mod tidy
      - run: go vet ./...
      - run: go test -race -coverprofile=coverage.txt ./...
      - uses: golangci/golangci-lint-action@v6
        with: { version: v1.59 }
